name: Run Tests and Deploy Allure Report

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Allure
        run: |
          sudo apt update
          sudo apt install -y default-jre
          wget https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz
          tar -zxvf allure-2.25.0.tgz
          sudo mv allure-2.25.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Run Tests
        run: mvn clean test || true

      - name: Verificar archivos de resultado (antes del reporte)
        run: |
          echo "🗂 Contenido en target/allure-results:"
          ls -lh target/allure-results || echo "❌ No se encontró target/allure-results"

          echo "🔍 Buscando attachments:"
          find target/allure-results -type f -name "*.txt" -exec ls -lh {} \;

      - name: Generate Allure Report
        run: allure generate target/allure-results --clean -o allure-report

      - name: Verificar contenido de allure-report
        run: |
          echo "📁 Contenido de allure-report/data/attachments:"
          ls -lh allure-report/data/attachments || echo "❌ No se encontraron attachments en el reporte generado"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report